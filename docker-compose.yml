services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: chiti
      POSTGRES_PASSWORD: chiti_secret
      POSTGRES_DB: chiti_console
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chiti"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://chiti:chiti_secret@db:5432/chiti_console
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      NEXT_PUBLIC_CONSOLE_URL: ${NEXT_PUBLIC_CONSOLE_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
